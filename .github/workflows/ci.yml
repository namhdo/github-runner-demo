# CI Pipeline -- github-runner-demo
# Uses GitHub Self-hosted Runner for automated build and testing
name: CI Pipeline with Self-hosted Runner

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allow manual run from GitHub UI

jobs:
  # JOB 1: Code quality check
  lint-and-format:
    name: Code Quality Check
    runs-on: self-hosted
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          
      - name: Run flake8 linter
        run: |
          # Check for syntax errors and code style
          # --max-line-length=120: allows lines up to 120 characters
          flake8 src/ tests/ --max-line-length=120 --statistics

  # JOB 2: Run Unit Tests
  run-tests:
    name: Run Unit Tests
    runs-on: self-hosted
    needs: lint-and-format # Only runs after lint succeeds
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run tests with coverage report
        run: |
          pytest tests/ -v \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml
            
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always() # Upload even if tests fail
        with:
          name: coverage-report
          path: coverage.xml

  # JOB 3: Build Summary
  build-summary:
    name: Build Summary
    runs-on: self-hosted
    needs: [lint-and-format, run-tests]
    if: always() # Always runs to summarize results
    steps:
      - name: Print success message
        if: needs.run-tests.result == 'success'
        run: |
          echo '================================'
          echo ' CI PIPELINE PASSED!'
          echo ' Ready to deploy to production.'
          echo '================================'
          
      - name: Print failure message
        if: needs.run-tests.result == 'failure'
        run: |
          echo ' CI PIPELINE FAILED!'
          echo ' Check logs to identify errors.'